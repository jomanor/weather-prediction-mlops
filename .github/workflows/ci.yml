name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, open-meteo]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint — ruff + black
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install linting tools
        run: pip install ruff black

      - name: ruff check
        run: ruff check .

      - name: black check
        run: black --check .

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Unit tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install \
            pytest pytest-cov \
            pyspark==3.5.5 \
            kafka-python \
            pymongo \
            requests \
            python-dotenv \
            mlflow

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=kafka/kafka-consumer \
            --cov=kafka/kafka-producer \
            --cov=spark/spark-jobs \
            --cov=scripts \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -v

      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/

      - name: Upload coverage XML (for codecov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Integration tests (only on PRs to main)
  # ─────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            pyspark==3.5.5 \
            kafka-python \
            pymongo \
            requests \
            python-dotenv \
            testcontainers[kafka,mongodb]

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          # testcontainers spins up its own Kafka + Mongo — no secret needed
          PYTHONPATH: ${{ github.workspace }}

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Docker build validation
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - service: producer
            context: kafka/kafka-producer
          - service: consumer
            context: kafka/kafka-consumer
          - service: api
            context: api
          - service: spark
            context: spark

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            --tag weather-${{ matrix.service }}:ci \
            ${{ matrix.context }}
